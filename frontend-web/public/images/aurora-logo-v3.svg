<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="v3-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="v3-light" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#93C5FD;stop-opacity:0.8" />
    </linearGradient>

    <linearGradient id="v3-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>

    <!-- Radial glow -->
    <radialGradient id="v3-glow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Concept: Hexagonal platform with rising data & people visualization -->
  <g transform="translate(8, 12)">
    <!-- Central hexagon (SaaS platform core) -->
    <path d="M 22 10 L 32 10 L 37 19 L 32 28 L 22 28 L 17 19 Z"
          fill="url(#v3-glow)"/>
    <path d="M 22 10 L 32 10 L 37 19 L 32 28 L 22 28 L 17 19 Z"
          stroke="url(#v3-main)"
          stroke-width="2.5"
          fill="none"/>

    <!-- Rising bars (HR metrics/growth) integrated into design -->
    <g opacity="0.7">
      <!-- Bar 1 -->
      <rect x="4" y="26" width="3" height="12" rx="1.5" fill="url(#v3-main)"/>
      <circle cx="5.5" cy="23" r="2" fill="#3B82F6"/>

      <!-- Bar 2 -->
      <rect x="10" y="22" width="3" height="16" rx="1.5" fill="url(#v3-main)"/>
      <circle cx="11.5" cy="19" r="2" fill="#3B82F6"/>

      <!-- Bar 3 -->
      <rect x="41" y="22" width="3" height="16" rx="1.5" fill="url(#v3-main)"/>
      <circle cx="42.5" cy="19" r="2" fill="#3B82F6"/>

      <!-- Bar 4 -->
      <rect x="47" y="26" width="3" height="12" rx="1.5" fill="url(#v3-main)"/>
      <circle cx="48.5" cy="23" r="2" fill="#3B82F6"/>
    </g>

    <!-- Three people inside hexagon (team collaboration) -->
    <g transform="translate(27, 16)">
      <!-- Person 1 - Left -->
      <circle cx="-6" cy="0" r="2" fill="#1E40AF"/>
      <path d="M -6 2.5 L -6 6 M -7.5 4 L -4.5 4"
            stroke="#1E40AF"
            stroke-width="1.5"
            stroke-linecap="round"/>

      <!-- Person 2 - Center -->
      <circle cx="0" cy="-2" r="2.2" fill="#2563EB"/>
      <path d="M 0 0.5 L 0 6 M -1.8 3.5 L 1.8 3.5"
            stroke="#2563EB"
            stroke-width="1.8"
            stroke-linecap="round"/>

      <!-- Person 3 - Right -->
      <circle cx="6" cy="0" r="2" fill="#1E40AF"/>
      <path d="M 6 2.5 L 6 6 M 4.5 4 L 7.5 4"
            stroke="#1E40AF"
            stroke-width="1.5"
            stroke-linecap="round"/>
    </g>

    <!-- Connection network lines -->
    <path d="M 5.5 23 L 21 16 L 27 14 L 33 16 L 42.5 19"
          stroke="#60A5FA"
          stroke-width="1.5"
          stroke-dasharray="2,2"
          opacity="0.4"/>

    <!-- Aurora waves (dawn light) -->
    <path d="M 2 36 Q 13 33, 27 36 Q 41 39, 52 36"
          stroke="url(#v3-light)"
          stroke-width="2.5"
          fill="none"
          opacity="0.5"
          stroke-linecap="round"/>

    <path d="M 2 39 Q 13 37, 27 39 Q 41 41, 52 39"
          stroke="url(#v3-light)"
          stroke-width="2"
          fill="none"
          opacity="0.3"
          stroke-linecap="round"/>

    <!-- Data points/nodes -->
    <circle cx="21" cy="16" r="1.5" fill="#60A5FA" opacity="0.6"/>
    <circle cx="33" cy="16" r="1.5" fill="#60A5FA" opacity="0.6"/>
    <circle cx="27" cy="30" r="1.5" fill="#60A5FA" opacity="0.6"/>

    <!-- Small sparkle/innovation indicator -->
    <g transform="translate(38, 12)" opacity="0.6">
      <path d="M 0 -3 L 0 3 M -3 0 L 3 0" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Text: Aurora -->
  <text x="62" y="27"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="22"
        font-weight="700"
        fill="url(#v3-text)"
        letter-spacing="-0.5">Aurora</text>

  <!-- Text: HR -->
  <text x="136" y="27"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="22"
        font-weight="700"
        fill="#3B82F6">HR</text>

  <!-- Tagline -->
  <text x="62" y="41"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="8"
        font-weight="500"
        fill="#64748B"
        letter-spacing="0.8">PEOPLE. ILLUMINATED. ALWAYS.</text>
</svg>
