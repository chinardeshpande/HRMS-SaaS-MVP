<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="v2-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="v2-accent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="v2-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Concept: Letter "A" formed by rising people + aurora waves -->
  <g transform="translate(5, 10)">
    <!-- Left pillar of "A" (person ascending) -->
    <g>
      <circle cx="8" cy="28" r="3.5" fill="url(#v2-gradient)"/>
      <path d="M 8 32 L 8 42 M 5 36 L 11 36"
            stroke="url(#v2-gradient)"
            stroke-width="2.5"
            stroke-linecap="round"/>
      <!-- Rising line -->
      <path d="M 10 28 L 18 8"
            stroke="url(#v2-gradient)"
            stroke-width="3"
            stroke-linecap="round"/>
    </g>

    <!-- Peak of "A" (achievement) -->
    <circle cx="22" cy="6" r="2.5" fill="#3B82F6" opacity="0.8"/>

    <!-- Right pillar of "A" (person ascending) -->
    <g>
      <circle cx="36" cy="28" r="3.5" fill="url(#v2-gradient)"/>
      <path d="M 36 32 L 36 42 M 33 36 L 39 36"
            stroke="url(#v2-gradient)"
            stroke-width="2.5"
            stroke-linecap="round"/>
      <!-- Rising line -->
      <path d="M 34 28 L 26 8"
            stroke="url(#v2-gradient)"
            stroke-width="3"
            stroke-linecap="round"/>
    </g>

    <!-- Crossbar of "A" (platform/connection) -->
    <line x1="14" y1="22" x2="30" y2="22"
          stroke="#3B82F6"
          stroke-width="2.5"
          opacity="0.7"/>

    <!-- Aurora waves flowing through -->
    <path d="M 4 35 Q 14 32, 22 35 Q 30 38, 40 35"
          stroke="url(#v2-accent)"
          stroke-width="2"
          fill="none"
          opacity="0.4"
          stroke-linecap="round"/>

    <path d="M 4 38 Q 14 36, 22 38 Q 30 40, 40 38"
          stroke="url(#v2-accent)"
          stroke-width="1.5"
          fill="none"
          opacity="0.3"
          stroke-linecap="round"/>

    <!-- Network nodes (SaaS) -->
    <circle cx="14" cy="22" r="2" fill="#3B82F6" opacity="0.6"/>
    <circle cx="30" cy="22" r="2" fill="#3B82F6" opacity="0.6"/>
    <circle cx="22" cy="35" r="1.5" fill="#3B82F6" opacity="0.5"/>

    <!-- Data connections -->
    <path d="M 14 22 L 22 35 L 30 22"
          stroke="#60A5FA"
          stroke-width="1"
          stroke-dasharray="2,2"
          opacity="0.3"/>
  </g>

  <!-- Text: Aurora -->
  <text x="60" y="27"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="22"
        font-weight="700"
        fill="url(#v2-text)"
        letter-spacing="-0.5">Aurora</text>

  <!-- Text: HR -->
  <text x="136" y="27"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="22"
        font-weight="700"
        fill="#3B82F6">HR</text>

  <!-- Tagline -->
  <text x="60" y="41"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="8"
        font-weight="500"
        fill="#64748B"
        letter-spacing="0.8">PEOPLE. ILLUMINATED. ALWAYS.</text>
</svg>
