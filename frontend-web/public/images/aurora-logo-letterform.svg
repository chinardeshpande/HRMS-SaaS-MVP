<svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ribbon-flow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#185FA5;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#534AB7;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#D4537E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF9F27;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="letter-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#26215C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#534AB7;stop-opacity:1" />
    </linearGradient>

    <!-- Mask to create gaps in ribbon where it passes behind the A -->
    <mask id="ribbon-mask">
      <rect width="220" height="60" fill="white"/>
      <!-- Mask out parts of ribbon behind the "A" -->
      <text x="6" y="38"
            font-family="Georgia, 'Times New Roman', serif"
            font-size="40"
            font-weight="700"
            fill="black"
            letter-spacing="-1">A</text>
    </mask>
  </defs>

  <!-- Large "A" letterform -->
  <text x="6" y="38"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="40"
        font-weight="700"
        fill="#eeecf8"
        letter-spacing="-1">A</text>

  <!-- Flowing aurora ribbon through the "A" -->
  <path d="M 6 24 Q 16 14, 24 18 Q 34 23, 24 30 Q 15 36, 24 41 Q 34 45, 44 38"
        fill="none"
        stroke="url(#ribbon-flow)"
        stroke-width="3"
        stroke-linecap="round"
        mask="url(#ribbon-mask)"/>

  <!-- Secondary ribbon (lighter) -->
  <path d="M 8 28 Q 18 18, 26 22 Q 36 27, 26 34 Q 17 40, 26 45 Q 36 49, 46 42"
        fill="none"
        stroke="url(#ribbon-flow)"
        stroke-width="1.8"
        stroke-linecap="round"
        opacity="0.5"
        mask="url(#ribbon-mask)"/>

  <!-- Text: urora -->
  <text x="52" y="28"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="24"
        font-weight="700"
        fill="url(#letter-text)"
        letter-spacing="-1">urora</text>

  <!-- Text: HR -->
  <text x="152" y="28"
        font-family="Arial, sans-serif"
        font-size="20"
        font-weight="300"
        fill="#534AB7"
        letter-spacing="9">HR</text>

  <!-- Separator -->
  <line x1="52" y1="38" x2="210" y2="38"
        stroke="#D3D1C7"
        stroke-width="0.75"/>

  <!-- Tagline -->
  <text x="52" y="50"
        font-family="Arial, sans-serif"
        font-size="8"
        font-weight="400"
        fill="#B4B2A9"
        letter-spacing="2">ILLUMINATE THE JOURNEY</text>

  <!-- Decorative aurora circles (top right accent) -->
  <circle cx="200" cy="16" r="10" fill="none" stroke="#534AB7" stroke-width="0.75" opacity="0.25"/>
  <circle cx="200" cy="16" r="6" fill="none" stroke="#D4537E" stroke-width="0.75" opacity="0.25"/>
  <circle cx="200" cy="16" r="2.5" fill="#EF9F27" opacity="0.3"/>
</svg>
