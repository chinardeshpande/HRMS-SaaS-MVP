<svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sunrise-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#534AB7;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#D4537E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF9F27;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="sunrise-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#534AB7;stop-opacity:1" />
    </linearGradient>

    <clipPath id="sunrise-clip">
      <rect x="4" y="12" width="50" height="34"/>
    </clipPath>
  </defs>

  <!-- Icon: Sunrise with concentric aurora rings -->
  <g transform="translate(6, 14)">
    <g clip-path="url(#sunrise-clip)">
      <!-- Outer ring -->
      <circle cx="25" cy="32" r="28"
              fill="none"
              stroke="url(#sunrise-grad)"
              stroke-width="7"
              opacity="0.15"/>

      <!-- Middle ring -->
      <circle cx="25" cy="32" r="20"
              fill="none"
              stroke="url(#sunrise-grad)"
              stroke-width="5"
              opacity="0.25"/>

      <!-- Inner ring -->
      <circle cx="25" cy="32" r="13"
              fill="none"
              stroke="url(#sunrise-grad)"
              stroke-width="4"
              opacity="0.35"/>
    </g>

    <!-- Sun core -->
    <circle cx="25" cy="32" r="6" fill="url(#sunrise-grad)" opacity="0.95"/>
    <circle cx="25" cy="32" r="3.5" fill="white" opacity="0.9"/>
    <circle cx="25" cy="32" r="1.5" fill="url(#sunrise-grad)"/>

    <!-- People dots above sunrise -->
    <circle cx="16" cy="22" r="2.2" fill="#534AB7" opacity="0.85"/>
    <circle cx="25" cy="19" r="2.2" fill="#D4537E" opacity="0.85"/>
    <circle cx="34" cy="22" r="2.2" fill="#EF9F27" opacity="0.85"/>
  </g>

  <!-- Text: Aurora -->
  <text x="62" y="28"
        font-family="Arial, Helvetica, sans-serif"
        font-size="24"
        font-weight="700"
        fill="url(#sunrise-text)"
        letter-spacing="-1">Aurora</text>

  <!-- Text: HR -->
  <text x="158" y="28"
        font-family="Arial, Helvetica, sans-serif"
        font-size="20"
        font-weight="400"
        fill="#888780"
        letter-spacing="7">HR</text>

  <!-- Separator -->
  <line x1="62" y1="38" x2="210" y2="38"
        stroke="#D3D1C7"
        stroke-width="0.75"/>

  <!-- Tagline -->
  <text x="62" y="50"
        font-family="Arial, sans-serif"
        font-size="8"
        font-weight="400"
        fill="#B4B2A9"
        letter-spacing="2">ILLUMINATE THE JOURNEY</text>
</svg>
