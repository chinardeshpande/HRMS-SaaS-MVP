<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 360" width="1360" height="360">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;700&amp;display=swap');
    </style>
  </defs>

  <!-- People circles (top) -->
  <circle cx="348" cy="72" r="24" fill="#0A66C2"/>
  <circle cx="428" cy="48" r="30" fill="#0A66C2"/>
  <circle cx="508" cy="72" r="24" fill="#0A66C2"/>

  <!-- Dashed connector threads -->
  <line x1="348" y1="96"  x2="332" y2="256" stroke="#0A66C2" stroke-width="2.4" stroke-linecap="round" opacity="0.14" stroke-dasharray="6 10"/>
  <line x1="428" y1="78"  x2="428" y2="244" stroke="#0A66C2" stroke-width="2.4" stroke-linecap="round" opacity="0.14" stroke-dasharray="6 10"/>
  <line x1="508" y1="96"  x2="524" y2="256" stroke="#0A66C2" stroke-width="2.4" stroke-linecap="round" opacity="0.14" stroke-dasharray="6 10"/>

  <!-- Main arc (sunrise) -->
  <path d="M 244 268 A 184 184 0 0 1 612 268" fill="none" stroke="#0A66C2" stroke-width="40" stroke-linecap="round"/>

  <!-- Inner echo arc -->
  <path d="M 292 268 A 136 136 0 0 1 564 268" fill="none" stroke="#0A66C2" stroke-width="18" stroke-linecap="round" opacity="0.22"/>

  <!-- Horizon baseline -->
  <line x1="200" y1="268" x2="656" y2="268" stroke="#0A66C2" stroke-width="3.6" stroke-linecap="round" opacity="0.13"/>

  <!-- Bottom anchor dots -->
  <circle cx="332" cy="268" r="14" fill="#0A66C2" opacity="0.38"/>
  <circle cx="428" cy="268" r="18" fill="#0A66C2"/>
  <circle cx="428" cy="268" r="8"  fill="white"/>
  <circle cx="524" cy="268" r="14" fill="#0A66C2" opacity="0.38"/>

  <!-- Wordmark: AuroraHR as one word -->
  <text
    x="696" y="268"
    font-family="'Plus Jakarta Sans', Arial, sans-serif"
    font-size="144"
    font-weight="700"
    fill="#0A66C2"
    letter-spacing="-6"
  >Aurora<tspan font-weight="300">HR</tspan></text>
</svg>
