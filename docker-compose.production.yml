version: '3.8'

services:
  # ==================================
  # Backend API Service
  # ==================================
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: production
    container_name: hrms-backend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: ${DB_SSL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      SENTRY_DSN: ${SENTRY_DSN:-}
      REDIS_HOST: ${REDIS_HOST:-}
      REDIS_PORT: ${REDIS_PORT:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      # Persistent logs
      - ./logs:/app/logs
      # Fallback uploads (if not using S3)
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hrms-network
    labels:
      - "com.hrms.service=backend"
      - "com.hrms.environment=production"

  # ==================================
  # Frontend Web Application
  # ==================================
  frontend:
    build:
      context: ./frontend-web
      dockerfile: ../docker/frontend/Dockerfile
      target: production
      args:
        VITE_API_URL: ${FRONTEND_API_URL}
        VITE_SOCKET_URL: ${FRONTEND_SOCKET_URL}
    container_name: hrms-frontend-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - hrms-network
    labels:
      - "com.hrms.service=frontend"
      - "com.hrms.environment=production"

  # ==================================
  # Nginx Reverse Proxy
  # ==================================
  nginx:
    image: nginx:alpine
    container_name: hrms-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx configuration
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificates (Let's Encrypt)
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      # Nginx cache
      - nginx_cache:/var/cache/nginx
      # Custom error pages
      - ./docker/nginx/error-pages:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.hrms.service=nginx"
      - "com.hrms.environment=production"

  # ==================================
  # Certbot for SSL Certificate
  # ==================================
  certbot:
    image: certbot/certbot
    container_name: hrms-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - hrms-network

volumes:
  nginx_cache:
    driver: local

networks:
  hrms-network:
    name: hrms-production-network
    driver: bridge
