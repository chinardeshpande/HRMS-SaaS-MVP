name: Deploy to Staging

on:
  push:
    branches: [staging, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  # ==================================
  # TESTS - Run all tests
  # ==================================
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hrms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: yarn install --frozen-lockfile

      - name: Run Backend Linter
        working-directory: ./backend
        run: yarn lint

      - name: Run Backend Tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: hrms_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test_secret_key
        run: yarn test

      - name: Install Frontend Dependencies
        working-directory: ./frontend-web
        run: yarn install --frozen-lockfile

      - name: Run Frontend Linter
        working-directory: ./frontend-web
        run: yarn lint

      - name: Run Frontend Tests
        working-directory: ./frontend-web
        run: yarn test

      - name: Build Frontend
        working-directory: ./frontend-web
        run: yarn build

  # ==================================
  # BUILD & DEPLOY - Auto-deploy to staging
  # ==================================
  deploy-staging:
    needs: tests
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.hrms-app.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/backend/Dockerfile
          push: false
          tags: hrms-backend-staging:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-web
          file: ./docker/frontend/Dockerfile
          push: false
          tags: hrms-frontend-staging:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.STAGING_API_URL }}
            VITE_SOCKET_URL=${{ secrets.STAGING_SOCKET_URL }}
          load: true

      - name: Save Docker images
        run: |
          docker save hrms-backend-staging:${{ github.sha }} | gzip > backend-staging.tar.gz
          docker save hrms-frontend-staging:${{ github.sha }} | gzip > frontend-staging.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.STAGING_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to Staging Server
        run: |
          # Copy images
          scp backend-staging.tar.gz ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_IP }}:/tmp/
          scp frontend-staging.tar.gz ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_IP }}:/tmp/
          scp docker-compose.production.yml ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_IP }}:/var/www/hrms-staging/docker-compose.yml

          # Deploy
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_IP }} << 'ENDSSH'
            cd /var/www/hrms-staging

            # Load and tag images
            docker load < /tmp/backend-staging.tar.gz
            docker load < /tmp/frontend-staging.tar.gz
            docker tag hrms-backend-staging:${{ github.sha }} hrms-backend:latest
            docker tag hrms-frontend-staging:${{ github.sha }} hrms-frontend:latest

            # Restart services
            docker-compose down
            docker-compose up -d

            # Clean up
            rm /tmp/backend-staging.tar.gz /tmp/frontend-staging.tar.gz
            docker system prune -f
          ENDSSH

      - name: Wait for services
        run: sleep 20

      - name: Run database migrations
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_IP }} << 'ENDSSH'
            cd /var/www/hrms-staging
            docker-compose exec -T backend yarn run migrate
          ENDSSH

      - name: Health Check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://staging.hrms-app.com/api/health)
          if [ $response -ne 200 ]; then
            echo "Staging health check failed"
            exit 1
          fi
          echo "Staging deployment successful!"

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Staging Deployment ${{ job.status }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
